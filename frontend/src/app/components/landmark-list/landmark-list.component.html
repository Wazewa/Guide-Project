<div class="landmark-grid">
  <mat-card *ngFor="let landmark of landmarks" class="landmark-card">
    <mat-card-title>{{ landmark.name }}</mat-card-title>
    <mat-card-subtitle>{{ getCategoryName(landmark.landmarkCategoryId) }}</mat-card-subtitle>
    <mat-card-content>
      <p>{{ landmark.description | slice:0:150 }}{{ landmark.description.length > 150 ? '...' : '' }}</p>
      <p><strong>Средняя оценка:</strong> {{ landmark.averageRating || '��� ������' }}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button [routerLink]="['/landmarks', landmark.id]">Подробнее</button>
    </mat-card-actions>
  </mat-card>
</div>

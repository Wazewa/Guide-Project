<div class="city-bg" [style.background-image]="'url(' + currentBackground + ')'">
</div>

<mat-toolbar color="primary">
  <span>Путеводитель по городу</span>
  <span class="spacer"></span>

  <button mat-button routerLink="/">Главная</button>
  <button mat-button routerLink="/search">Поиск</button>

  <ng-container *ngIf="user; else notLoggedIn">
    <span class="user-name">Привет, {{ user.name }}!</span>
    <button mat-button (click)="logout()">Выйти</button>
  </ng-container>

  <ng-template #notLoggedIn>
    <button mat-button routerLink="/login">Войти</button>
    <button mat-button routerLink="/register">Регистрация</button>
  </ng-template>
</mat-toolbar>

<router-outlet></router-outlet>
